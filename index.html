<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="이음">
  <meta name="theme-color" content="#1a73e8">
  <title>이음 모바일</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="icon" href="favicon.png">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; background: #f5f6f8; color: #1a1a1a; height: 100dvh; overflow: hidden; }

    /* ── 로그인 ── */
    #login-screen { height: 100dvh; display: flex; flex-direction: column; background: linear-gradient(160deg, #1a73e8, #0d47a1); }
    .login-hero { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; padding: 40px 24px 20px; }
    .login-hero .app-icon { width: 72px; height: 72px; background: rgba(255,255,255,.2); border-radius: 20px; display: flex; align-items: center; justify-content: center; margin-bottom: 16px; }
    .login-hero .app-icon .material-symbols-outlined { font-size: 40px; color: white; }
    .login-hero h1 { font-size: 28px; font-weight: 700; letter-spacing: -.5px; }
    .login-hero p { font-size: 14px; opacity: .75; margin-top: 6px; }
    .login-card { background: white; border-radius: 24px 24px 0 0; padding: 28px 24px 40px; }
    .login-card h2 { font-size: 17px; font-weight: 700; margin-bottom: 20px; }
    .form-group { margin-bottom: 14px; }
    .form-group label { font-size: 12px; font-weight: 600; color: #666; display: block; margin-bottom: 6px; }
    .form-group select, .form-group input { width: 100%; padding: 13px 14px; border: 1.5px solid #e8e8e8; border-radius: 12px; font-size: 15px; outline: none; background: #fafafa; appearance: none; -webkit-appearance: none; transition: border-color .15s; box-sizing: border-box; }
    .form-group select:focus, .form-group input:focus { border-color: #1a73e8; background: white; }
    .school-search-wrap { position: relative; }
    .school-search-wrap input.has-value { border-color: #1a73e8; background: white; }
    #school-dropdown { position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: white; border: 1.5px solid #1a73e8; border-radius: 12px; max-height: 200px; overflow-y: auto; z-index: 100; box-shadow: 0 4px 16px rgba(0,0,0,.1); }
    .school-option { padding: 12px 14px; font-size: 15px; cursor: pointer; transition: background .1s; }
    .school-option:hover, .school-option:active { background: #f0f6ff; }
    .school-option.no-result { color: #999; cursor: default; }
    .school-option.no-result:hover { background: none; }
    .login-btn { width: 100%; padding: 15px; background: #1a73e8; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 6px; transition: background .15s; }
    .login-btn:active { background: #1557b0; }
    .login-btn:disabled { background: #a8c4e8; }
    .login-error { color: #d32f2f; font-size: 13px; text-align: center; margin-top: 10px; min-height: 18px; }

    /* ── 앱 셸 ── */
    #app-screen { height: 100dvh; display: flex; flex-direction: column; }
    .app-header { background: white; padding: 10px 16px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #f0f0f0; flex-shrink: 0; }
    .app-header .school-name { font-size: 11px; color: #999; }
    .app-header .teacher-name { font-size: 16px; font-weight: 700; flex: 1; }
    .logout-btn { background: none; border: 1px solid #e8e8e8; border-radius: 8px; padding: 5px 11px; font-size: 12px; color: #666; cursor: pointer; }
    .tab-panels { flex: 1; overflow: hidden; position: relative; }
    .tab-panel { position: absolute; inset: 0; overflow-y: auto; display: none; }
    .tab-panel.active { display: block; }

    /* ── 날짜 네비 ── */
    .date-nav { display: flex; align-items: center; justify-content: space-between; padding: 11px 16px; background: white; border-bottom: 1px solid #f0f0f0; position: sticky; top: 0; z-index: 10; flex-shrink: 0; }
    .date-nav .nav-btn { background: none; border: none; cursor: pointer; padding: 4px 8px; border-radius: 8px; color: #555; display: flex; align-items: center; }
    .date-nav .nav-btn .material-symbols-outlined { font-size: 22px; }
    .date-nav .nav-btn:active { background: #f0f0f0; }
    .date-nav .date-label { font-size: 15px; font-weight: 700; color: #1a1a1a; }
    .date-nav .today-btn, .week-nav .today-btn, .month-nav .today-btn { background: #e8f0fe; border: none; color: #1a73e8; font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 20px; cursor: pointer; }

    /* ── 공통 카드 ── */
    .section-card { background: white; margin: 12px 16px; border-radius: 14px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
    .card-row { display: flex; align-items: flex-start; padding: 13px 16px; gap: 12px; border-bottom: 1px solid #f5f5f5; }
    .card-row:last-child { border-bottom: none; }
    .time-col { min-width: 48px; text-align: center; padding-top: 1px; }
    .time-top { font-size: 13px; font-weight: 700; color: #1a73e8; }
    .time-bot { font-size: 11px; color: #bbb; margin-top: 1px; }
    .card-body { flex: 1; min-width: 0; }
    .card-title { font-size: 14px; font-weight: 600; color: #1a1a1a; line-height: 1.4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-sub { font-size: 12px; color: #888; margin-top: 3px; }
    .type-badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 600; flex-shrink: 0; margin-top: 2px; white-space: nowrap; }
    .badge-event { background: #e8f0fe; color: #1a73e8; }
    .badge-deadline { background: #fce8e6; color: #c62828; }
    .badge-absence { background: #fff3e0; color: #e65100; }
    .badge-routine { background: #e6f4ea; color: #2e7d32; }
    .badge-class { background: #f3e8fd; color: #6a1b9a; }
    .empty-state { text-align: center; padding: 56px 24px; color: #ccc; }
    .empty-state .material-symbols-outlined { font-size: 48px; display: block; margin-bottom: 10px; }
    .empty-state p { font-size: 14px; }
    .loading { text-align: center; padding: 40px 24px; color: #ccc; font-size: 14px; }
    .section-label { font-size: 12px; font-weight: 700; color: #999; padding: 16px 16px 6px; text-transform: uppercase; letter-spacing: .5px; }

    /* ── 캘린더 시간 그리드 ── */
    .tg-chips { display: flex; flex-wrap: wrap; gap: 6px; padding: 10px 16px 8px; }
    .tg-chip { display: flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 20px; }
    .tg-chip-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .tg-allday { padding: 2px 16px 6px; display: flex; flex-direction: column; gap: 4px; }
    .tg-allday-row { display: flex; align-items: center; gap: 6px; padding: 6px 10px; background: #f8f9fa; border-radius: 8px; font-size: 12px; font-weight: 600; color: #333; }
    .tg-wrap { display: flex; margin: 6px 12px 16px; }
    .tg-axis { position: relative; width: 30px; flex-shrink: 0; }
    .tg-hour-lbl { position: absolute; right: 4px; font-size: 10px; color: #ccc; font-weight: 500; transform: translateY(-50%); white-space: nowrap; }
    .tg-col { position: relative; flex: 1; background: white; border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,.06); overflow: hidden; }
    .tg-grid-line { position: absolute; left: 0; right: 0; height: 1px; background: #f0f0f0; }
    .tg-grid-line.half { background: #f8f8f8; }
    .tg-block { position: absolute; border-radius: 5px; padding: 3px 6px; overflow: hidden; box-sizing: border-box; }
    .tg-class   { background: #f8fafc; border-left: 3px solid #94a3b8; color: #475569; }
    .tg-vacated { background: #fce8e6; border-left: 3px solid #c62828; }
    .tg-changed { background: #fff8f0; border-left: 3px solid #e65100; }
    .tg-reinf   { background: #fff1f2; border-left: 3px solid #f43f5e; color: #9f1239; }
    .tg-sup     { background: #f3e8ff; border-left: 3px solid #a855f7; }
    .tg-event   { background: #e8f0fe; border-left: 3px solid #1a73e8; }
    .tg-routine { background: #e8f0fe; border-left: 3px solid #1a73e8; }
    .tg-absence { background: #fff3e0; border-left: 3px solid #e65100; }
    .tg-deadline{ background: #fce8e6; border-left: 3px solid #c62828; }
    .tg-blk-title { font-size: 13px; font-weight: 700; color: #1a1a1a; line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tg-blk-sub   { font-size: 11px; color: #888; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tg-blk-tag   { font-size: 11px; font-weight: 700; display: inline; margin-left: 3px; }
    .tg-now-line  { position: absolute; left: 0; right: 0; height: 2px; background: #ef4444; z-index: 5; pointer-events: none; }
    .tg-now-line::before { content: ''; position: absolute; left: -3px; top: -4px; width: 10px; height: 10px; border-radius: 50%; background: #ef4444; }

    /* ── 캘린더 민트 메모 점 ── */
    .tg-mint-wrap { position: absolute; right: 4px; width: 16px; height: 16px; z-index: 6; cursor: pointer; }
    .tg-mint-pin  { width: 16px; height: 16px; border-radius: 50%; background: #14b8a6; border: 2px solid white; box-shadow: 0 2px 8px rgba(20,184,166,.5); transition: transform .15s; }
    .tg-mint-wrap.active .tg-mint-pin { background: #0f766e; transform: scale(1.2); }
    .tg-mint-popover { display: none; position: absolute; right: 20px; top: -4px; max-width: 180px; min-width: 100px; background: rgba(20,184,166,.95); color: white; padding: 7px 10px; border-radius: 8px; font-size: 12px; font-weight: 500; line-height: 1.45; white-space: pre-wrap; box-shadow: 0 4px 12px rgba(0,0,0,.2); z-index: 20; word-break: break-word; pointer-events: none; }
    .tg-mint-popover::after { content: ''; position: absolute; right: -5px; top: 8px; border: 5px solid transparent; border-left-color: rgba(20,184,166,.95); border-right-width: 0; }
    .tg-mint-wrap.active .tg-mint-popover { display: block; }

    /* ── 캘린더 체크리스트 ── */
    .tg-checklist { margin: 0 12px 16px; }
    .tg-cl-header { display: flex; align-items: center; justify-content: space-between; padding: 11px 14px; background: white; border-radius: 10px 10px 0 0; box-shadow: 0 1px 4px rgba(0,0,0,.06); cursor: pointer; user-select: none; -webkit-user-select: none; }
    .tg-cl-header.collapsed { border-radius: 10px; }
    .tg-cl-title  { font-size: 13px; font-weight: 700; color: #475569; display: flex; align-items: center; gap: 6px; }
    .tg-cl-badge  { background: #e6faf8; color: #0d9488; border-radius: 10px; padding: 1px 7px; font-size: 11px; }
    .tg-cl-chevron { font-size: 18px; color: #94a3b8; transition: transform .2s; }
    .tg-cl-header.collapsed .tg-cl-chevron { transform: rotate(-90deg); }
    .tg-cl-body   { background: white; border-radius: 0 0 10px 10px; box-shadow: 0 1px 4px rgba(0,0,0,.06); overflow: hidden; }
    .tg-cl-item   { display: flex; align-items: flex-start; gap: 10px; padding: 10px 14px; border-top: 1px solid #f5f5f5; }
    .tg-cl-item:first-child { border-top: none; }
    .tg-cl-check  { width: 18px; height: 18px; border-radius: 4px; border: 2px solid #cbd5e1; appearance: none; -webkit-appearance: none; flex-shrink: 0; margin-top: 1px; background: white; cursor: pointer; transition: background .15s, border-color .15s; background-repeat: no-repeat; background-position: center; background-size: 10px; }
    .tg-cl-check:checked { background-color: #14b8a6; border-color: #14b8a6; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 12 10' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 5L4.5 8.5L11 1.5' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E"); }
    .tg-cl-text   { flex: 1; font-size: 13px; color: #334155; line-height: 1.5; }
    .tg-cl-text.done { text-decoration: line-through; color: #94a3b8; }
    .tg-cl-empty  { padding: 14px; text-align: center; color: #94a3b8; font-size: 13px; }

    /* ── 캘린더 체크리스트 좌측 사이드바 ── */
    #tab-calendar.active { display: flex; flex-direction: column; overflow: hidden; }
    .cal-body  { flex: 1; position: relative; overflow: hidden; }
    .cal-scroll { height: 100%; overflow-y: auto; }

    #cal-cl-trigger { position: absolute; left: 0; top: 10px; z-index: 25; background: white; border: 1.5px solid #e8e8e8; border-left: none; border-radius: 0 10px 10px 0; padding: 10px 5px 10px 3px; box-shadow: 3px 0 10px rgba(0,0,0,.08); cursor: pointer; display: flex; align-items: center; color: #94a3b8; transition: color .15s, background .15s; }
    #cal-cl-trigger:active { background: #f0fdfa; }
    #cal-cl-trigger .material-symbols-outlined { font-size: 16px; }
    #cal-cl-trigger.has-todos { color: #14b8a6; border-color: #99f6e4; }

    #cal-cl-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,.3); z-index: 29; display: none; }
    #cal-cl-backdrop.open { display: block; }

    #cal-cl-overlay { position: absolute; top: 0; left: 0; bottom: 0; width: min(264px, 85vw); background: white; z-index: 30; transform: translateX(-100%); transition: transform 0.28s cubic-bezier(0.4,0,0.2,1); display: flex; flex-direction: column; overflow: hidden; box-shadow: 4px 0 20px rgba(0,0,0,.15); }
    #cal-cl-overlay.open { transform: translateX(0); }
    .cal-cl-ov-header { padding: 13px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f0f0f0; flex-shrink: 0; }
    .cal-cl-ov-title { font-size: 15px; font-weight: 800; color: #1e293b; display: flex; align-items: center; gap: 7px; }
    .cal-cl-ov-close { background: none; border: none; cursor: pointer; color: #94a3b8; display: flex; align-items: center; padding: 6px; border-radius: 8px; }
    .cal-cl-ov-close:active { background: #f0f0f0; }
    .cal-cl-list { flex: 1; overflow-y: auto; padding: 8px 14px 24px; }
    .cal-cl-list .tg-cl-item:first-child { border-top: none; }

    /* ── 학사일정 달력 ── */
    .month-nav { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: white; border-bottom: 1px solid #f0f0f0; position: sticky; top: 0; z-index: 10; }
    .month-nav .nav-btn { background: none; border: none; cursor: pointer; padding: 4px 8px; border-radius: 8px; color: #555; display: flex; align-items: center; }
    .month-nav .nav-btn .material-symbols-outlined { font-size: 22px; }
    .month-nav .month-label { font-size: 16px; font-weight: 700; }
    .cal-wrap { padding: 8px 16px 16px; }
    .cal-table { width: 100%; border-collapse: collapse; }
    .cal-table th { font-size: 11px; font-weight: 700; color: #999; text-align: center; padding: 8px 0 6px; width: 20%; }
    .cal-table td { border: 1px solid #f0f0f0; vertical-align: top; padding: 5px 4px; font-size: 11px; height: 72px; }
    .day-num { font-size: 12px; font-weight: 600; color: #333; display: inline-block; width: 22px; height: 22px; line-height: 22px; text-align: center; border-radius: 50%; margin-bottom: 2px; }
    .day-num.today-circle { background: #1a73e8; color: white; }
    .cal-table td.outside { background: #fafafa; }
    .cal-table td.outside .day-num { color: #ddd; }
    .event-pill { display: block; font-size: 10px; padding: 1px 4px; border-radius: 3px; margin-bottom: 2px; white-space: normal; word-break: keep-all; line-height: 1.5; font-weight: 500; }
    .color-RED { color: #c62828; background: #fce8e6; }
    .color-BLUE { color: #1565c0; background: #e8f0fe; }
    .color-GREEN { color: #2e7d32; background: #e6f4ea; }
    .color-PURPLE { color: #6a1b9a; background: #f3e8fd; }
    .color-GREY { color: #555; background: #f1f3f4; }

    /* ── 일과시간표 ── */
    .period-card { background: white; margin: 12px 16px; border-radius: 14px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
    .period-row { display: flex; align-items: center; padding: 13px 16px; gap: 14px; border-bottom: 1px solid #f5f5f5; }
    .period-row:last-child { border-bottom: none; }
    .period-row-lunch { background: #fff7ed; }
    .period-grade-btn { font-size: 12px; font-weight: 700; padding: 4px 12px; border-radius: 20px; border: 1.5px solid #1a73e8; background: white; color: #1a73e8; cursor: pointer; font-family: inherit; white-space: nowrap; }
    .p-num { font-size: 15px; font-weight: 800; color: #1a73e8; min-width: 28px; }
    .p-time { font-size: 15px; color: #333; flex: 1; }
    .p-event { font-size: 13px; color: #888; max-width: 90px; text-align: right; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ── 주간 시간표 ── */
    .week-nav { display: flex; align-items: center; justify-content: space-between; padding: 11px 16px; background: white; border-bottom: 1px solid #f0f0f0; position: sticky; top: 0; z-index: 10; }
    .week-nav .nav-btn { background: none; border: none; cursor: pointer; padding: 4px 8px; border-radius: 8px; color: #555; display: flex; align-items: center; }
    .week-nav .nav-btn .material-symbols-outlined { font-size: 22px; }
    .week-nav .week-label { font-size: 14px; font-weight: 700; }
    .tt-scroll { overflow-x: auto; margin: 12px 16px; border-radius: 14px; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
    .tt-table { min-width: 340px; border-collapse: collapse; width: 100%; background: white; table-layout: fixed; }
    .tt-table th { background: #f8f9fa; font-size: 11px; font-weight: 700; text-align: center; padding: 9px 4px; border-bottom: 2px solid #e8e8e8; border-right: 1px solid #f0f0f0; color: #555; }
    .tt-table th:first-child { width: 32px; color: #bbb; font-size: 10px; }
    .tt-table th.today-col { color: #1a73e8; background: #e8f0fe; }
    .tt-table td { border: 1px solid #e2e8f0; text-align: center; padding: 0; vertical-align: middle; height: 46px; font-size: 11px; }
    .tt-table td.period-col { color: #64748b; font-weight: 700; background: #f9fafb; font-size: 11px; width: 26px; padding: 0 4px; }
    .tt-mc  { position: relative; width: 100%; height: 100%; }
    .tt-bb  { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 2px; border-radius: 3px; overflow: hidden; gap: 1px; }
    .tt-bt  { font-size: 0.78rem; font-weight: 900; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; line-height: 1.1; text-align: center; }
    .tt-bs  { font-size: 0.68rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; line-height: 1; text-align: center; color: #515154; }
    .tt-c-normal  { background: #e8f2fc; box-shadow: inset 0 0 0 1px #c2deff; }
    .tt-c-normal .tt-bt  { color: #0071e3; }
    .tt-c-changed { background: #fef9c3; box-shadow: inset 0 0 0 1px #fde047; }
    .tt-c-changed .tt-bt { color: #854d0e; }
    .tt-c-changed .tt-bs { color: #a16207; }
    .tt-c-reinf   { background: #ffe4e6; box-shadow: inset 0 0 0 1px #fda4af; }
    .tt-c-reinf .tt-bt   { color: #e11d48; }
    .tt-c-sup     { background: #f3e8ff; box-shadow: inset 0 0 0 1px #d8b4fe; }
    .tt-c-sup .tt-bt     { color: #6b21a8; }
    .tt-c-vacated { background: #fffdf2; position: relative; }
    .tt-c-vacated::after { content: ''; position: absolute; top: 2px; left: 2px; right: 2px; bottom: 2px; border: 2px dashed #fde047; border-radius: 4px; background: rgba(254,249,195,0.15); }
    .tt-c-vacated-reinf { background: #fff5f5; position: relative; }
    .tt-c-vacated-reinf::after { content: ''; position: absolute; top: 2px; left: 2px; right: 2px; bottom: 2px; border: 2px dashed #fca5a5; border-radius: 4px; }
    .tt-c-event   { background: #e8fcf0; box-shadow: inset 0 0 0 1px #bbf7d0; }
    .tt-c-event .tt-bt   { color: #15803d; font-weight: 900; }
    .tt-c-empty   { background: #f9f9f9; }
    .tt-c-conflict { background: #fff5f5 !important; box-shadow: inset 0 0 0 2px #ff3b30 !important; padding: 0 !important; height: auto !important; vertical-align: top; }
    .tt-c-conflict .tt-bb { height: auto !important; border-bottom: 1px solid #fca5a5; }
    .tt-c-conflict .tt-bb:last-child { border-bottom: none; }
    .tt-c-nodata  { background: #f9f9f9; border: none !important; }
    .tt-bdg { font-size: 0.5rem; padding: 0 2px; border-radius: 2px; margin-left: 2px; font-weight: 900; vertical-align: middle; color: white; display: inline-block; }

<body>

<!-- ════════════════ 로그인 화면 ════════════════ -->
<div id="login-screen">
  <div class="login-hero">
    <div class="app-icon"><span class="material-symbols-outlined">hub</span></div>

<!-- ════════════════ 앱 화면 ════════════════ -->
<div id="app-screen" style="display:none">
  <header class="app-header">
    <div>
      <div class="school-name" id="header-school"></div>
      <div class="teacher-name" id="header-name"></div>
    </div>

  </header>

  <div class="tab-panels">

    <!-- 1. 캘린더 -->
    <div id="tab-calendar" class="tab-panel active">
      <div class="date-nav">

        <button class="today-btn" onclick="goToday('calendar')">오늘</button>
        <button class="nav-btn" onclick="moveDay('calendar', 1)"><span class="material-symbols-outlined">chevron_right</span></button>

      <div class="cal-body">

            </div>

      <div class="date-nav">

        <span class="date-label" id="periods-date-label"></span>
        <button class="today-btn" onclick="goToday('periods')">오늘</button>
        <button class="nav-btn" onclick="moveDay('periods', 1)"><span class="material-symbols-outlined">chevron_right</span></button>

    <!-- 4. 시간표 (주간) -->

        <button class="today-btn" onclick="goToday('timetable')">이번 주</button>
        <button class="nav-btn" onclick="moveWeek(1)"><span class="material-symbols-outlined">chevron_right</span></button>
      </div>
      <div class="tt-scroll"><div id="timetable-content"></div></div>

    <!-- 5. 조종례 -->
    <div id="tab-morning" class="tab-panel">
      <div class="date-nav" style="top:0">
        <button class="nav-btn" onclick="moveDay('morning', -1)"><span class="material-symbols-outlined">chevron_left</span></button>
        <span class="date-label" id="morning-date-label"></span>
        <button class="today-btn" onclick="goToday('morning')">오늘</button>

      <div class="grade-tab-bar">
        <button class="grade-tab active" data-grade="1학년" onclick="selectGrade(this)">1학년</button>
        <button class="grade-tab" data-grade="2학년" onclick="selectGrade(this)">2학년</button>

  <!-- 하단 네비게이션 -->

      <span class="material-symbols-outlined">team_dashboard</span>
      <span class="nav-label">내 일정</span>
    </button>
    <button class="nav-item" onclick="switchTab('academic', this)">
      <span class="material-symbols-outlined">calendar_month</span>
      <span class="nav-label">학사일정</span>
    </button>
    <button class="nav-item" onclick="switchTab('periods', this)">
      <span class="material-symbols-outlined">acute</span>
      <span class="nav-label">일과시간표</span>

    <button class="nav-item" onclick="switchTab('timetable', this)">
      <span class="material-symbols-outlined">schedule</span>
      <span class="nav-label">수업시간표</span>

    <button class="nav-item" onclick="switchTab('morning', this)">
      <span class="material-symbols-outlined">campaign</span>

</div>

<script>
const SUPABASE_URL  = 'https://qhfqxrvxjrmnkskklfmm.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFoZnF4cnZ4anJtbmtza2tsZm1tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4Mjg3NjksImV4cCI6MjA5NjQwNDc2OX0.kuqxcDaWTxzZGXReIk3AtKLwip_cvDYTbi_uAmRHFHw';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// ── 상태 ──
let me = null;
let currentTab = 'calendar';
const state = {
  calendar: new Date(),
  periods:  new Date(),
  morning:  new Date(),
  academic: new Date(),
  timetableWeek: 0,
  morningGrade: localStorage.getItem('morningGrade') || '1학년',
};

// ── 유틸 ──
const fmt = d => `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;
const p2  = n => String(n).padStart(2, '0');
const KO_DAY = ['일','월','화','수','목','금','토'];
const dateLabel = d => `${d.getFullYear()}.${p2(d.getMonth()+1)}.${p2(d.getDate())} (${KO_DAY[d.getDay()]})`;
const addDays = (d, n) => { const r = new Date(d); r.setDate(r.getDate()+n); return r; };
const skipToWeekday = (d, dir) => {
  const day = d.getDay();
  if (day === 6) return addDays(d, dir > 0 ? 2 : -1); // 토 → 월(앞) or 금(뒤)
  if (day === 0) return addDays(d, dir > 0 ? 1 : -2); // 일 → 월(앞) or 금(뒤)
  return d;
};
const getMonday = (d, offset=0) => {
  const r = new Date(d);
  const day = r.getDay();
  r.setDate(r.getDate() + (day === 0 ? -6 : 1 - day) + offset * 7);
  r.setHours(0,0,0,0);
  return r;
};
const isToday = d => fmt(d) === fmt(new Date());

// ── 자동 로그인 저장소 ──
const CRED_KEY = 'eeum_cred';

function saveCredentials(email, password, school, displayName) {
  localStorage.setItem(CRED_KEY, JSON.stringify({
    email, password,
    schoolId: school.id, schoolCode: school.code,
    schoolName: school.name, schoolRegion: school.region || '',
    displayName
  }));
}

function loadCredentials() {
  try { return JSON.parse(localStorage.getItem(CRED_KEY)); } catch { return null; }
}

function clearCredentials() {
  localStorage.removeItem(CRED_KEY);
}

function prefillLoginForm(saved) {
  const school = allSchools.find(s => s.id === saved.schoolId);
  if (school) {
    selectedSchool = school;
    document.getElementById('school-input').value = saved.schoolName;
    document.getElementById('school-input').classList.add('has-value');
    if (saved.schoolRegion) {
      const sel = document.getElementById('region-select');
      sel.innerHTML = `<option value="${school.id}">${saved.schoolRegion}</option>`;
      document.getElementById('region-group').style.display = 'block';
    }
  }
  document.getElementById('login-name').value = saved.displayName || '';
  document.getElementById('login-pw').value = saved.password || '';
}

// ── 초기화 ──
window.onload = async () => {
  await loadSchools();
  const { data: { session } } = await sb.auth.getSession();
  if (session) { showApp(session.user); return; }

  const saved = loadCredentials();
  if (saved) {
    const { data, error } = await sb.auth.signInWithPassword({ email: saved.email, password: saved.password });
    if (!error && data.user) { showApp(data.user); return; }
    prefillLoginForm(saved);
  }
};

document.addEventListener('click', e => {
  const wrap = document.querySelector('.school-search-wrap');
  if (wrap && !wrap.contains(e.target)) {
    document.getElementById('school-dropdown').style.display = 'none';
  }
});

let allSchools = [];
let selectedSchool = null;

async function loadSchools() {
  const { data } = await sb.from('schools').select('id, name, code, region').order('name');
  allSchools = data || [];
}

function filterSchools(query) {
  const dropdown = document.getElementById('school-dropdown');
  if (!query.trim()) { dropdown.style.display = 'none'; return; }

  const filtered = allSchools.filter(s => s.name.includes(query.trim()));
  if (!filtered.length) {
    dropdown.innerHTML = '<div class="school-option no-result">검색 결과가 없습니다</div>';
    dropdown.style.display = 'block';
    return;
  }

  const names = [...new Set(filtered.map(s => s.name))];
  dropdown.innerHTML = names.map(name =>
    `<div class="school-option" onclick="selectSchoolName(${JSON.stringify(name)})">${name}</div>`
  ).join('');
  dropdown.style.display = 'block';
}

function selectSchoolName(name) {
  document.getElementById('school-input').value = name;
  document.getElementById('school-input').classList.add('has-value');
  document.getElementById('school-dropdown').style.display = 'none';

  const matches = allSchools.filter(s => s.name === name);
  if (matches.length === 1) {
    selectedSchool = matches[0];
    document.getElementById('region-group').style.display = 'none';
  } else {
    selectedSchool = null;
    const sel = document.getElementById('region-select');
    sel.innerHTML = '<option value="">지역을 선택하세요</option>' +
      matches.map(s => `<option value="${s.id}">${s.region || '지역 미설정'}</option>`).join('');
    document.getElementById('region-group').style.display = 'block';
  }
}

function selectRegion(schoolId) {
  selectedSchool = allSchools.find(s => s.id === schoolId) || null;
}

// ── 로그인 ──
async function login() {
  const btn = document.querySelector('.login-btn');
  const err = document.getElementById('login-error');
  err.textContent = '';
  const name = document.getElementById('login-name').value.trim();
  const pw   = document.getElementById('login-pw').value;
  if (!selectedSchool) { err.textContent = '학교를 선택해주세요.'; return; }
  if (!name)           { err.textContent = '이름을 입력해주세요.'; return; }
  if (!pw)             { err.textContent = '비밀번호를 입력해주세요.'; return; }

  const school = selectedSchool;
  btn.disabled = true; btn.textContent = '로그인 중...';

  const { data: lookup, error: le } = await sb
    .from('teacher_lookup').select('username').eq('school_id', school.id).eq('display_name', name).maybeSingle();

  if (!lookup) {
    err.textContent = '등록되지 않은 이름입니다. 관리자에게 문의하세요.';
    btn.disabled = false; btn.textContent = '로그인'; return;
  }

  const email = `${lookup.username}@${school.code}.eeum.local`;
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pw });

  if (error) {
    err.textContent = '비밀번호가 올바르지 않습니다.';
    btn.disabled = false; btn.textContent = '로그인'; return;
  }

  saveCredentials(email, pw, school, name);
  showApp(data.user);
}

async function logout() {
  await sb.auth.signOut();
  clearCredentials();
  me = null;
  selectedSchool = null;
  document.getElementById('school-input').value = '';
  document.getElementById('school-input').classList.remove('has-value');
  document.getElementById('region-group').style.display = 'none';
  document.getElementById('login-name').value = '';
  document.getElementById('login-pw').value = '';
  document.getElementById('app-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
}

function showApp(user) {
  me = user;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'flex';
  document.getElementById('header-school').textContent = user.user_metadata.school_name || '';
  document.getElementById('header-name').textContent = user.user_metadata.name + ' 선생님';

  // 학교명 표시 (schools 테이블에서 가져오기)
  sb.from('schools').select('name').eq('id', user.user_metadata.school_id).single()
    .then(({ data }) => { if (data) document.getElementById('header-school').textContent = data.name; });

  const savedGrade = state.morningGrade;
  document.querySelectorAll('.grade-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.grade === savedGrade);
  });

  ['calendar', 'periods', 'morning'].forEach(tab => {
    state[tab] = skipToWeekday(state[tab], state[tab].getDay() === 6 ? -1 : 1);
  });
  loadTab('calendar');
}

// ── 탭 전환 ──
function switchTab(tab, btn) {
  if (_calTimer) { clearInterval(_calTimer); _calTimer = null; }
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  btn.classList.add('active');
  currentTab = tab;
  loadTab(tab);
}

function loadTab(tab) {
  if (tab === 'calendar')  loadCalendar();
  if (tab === 'academic')  loadAcademic();
  if (tab === 'periods')   loadPeriods();
  if (tab === 'timetable') loadTimetable();
  if (tab === 'morning')   loadMorning();
}

// ── 날짜 이동 ──
function moveDay(tab, delta) {
  const d = addDays(state[tab], delta);
  const weekdayTabs = ['calendar', 'periods', 'morning'];
  state[tab] = weekdayTabs.includes(tab) ? skipToWeekday(d, delta) : d;
  loadTab(tab);
}
function goToday(tab) {
  if (tab === 'timetable') { state.timetableWeek = 0; loadTimetable(); return; }
  if (tab === 'academic')  { state.academic = new Date(); loadAcademic(); return; }
  state[tab] = new Date();
  if (['calendar', 'periods', 'morning'].includes(tab)) {
    const day = state[tab].getDay();
    state[tab] = skipToWeekday(state[tab], day === 6 ? -1 : 1);
  }
  loadTab(tab);
}
function moveMonth(delta) {
  state.academic.setMonth(state.academic.getMonth() + delta);
  loadAcademic();
}
function moveWeek(delta) {
  state.timetableWeek += delta;
  loadTimetable();
}
function selectGrade(el) {
  document.querySelectorAll('.grade-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  state.morningGrade = el.dataset.grade;
  localStorage.setItem('morningGrade', state.morningGrade);
  loadMorning();
}

// ════════════════ 1. 캘린더 ════════════════
let _calTimer = null;

async function loadCalendar() {
  if (_calTimer) { clearInterval(_calTimer); _calTimer = null; }
  const d = state.calendar;
  document.getElementById('calendar-date-label').textContent = dateLabel(d);
  const el = document.getElementById('calendar-content');

  const dateStr = fmt(d);
  const schoolId = me.user_metadata.school_id;
  const teacherId = me.user_metadata.teacher_id;

  const [acRes, calRes, ttRes, schRes, taskRes] = await Promise.all([
    sb.from('academic_calendar').select('*')
      .eq('school_id', schoolId).eq('event_date', dateStr).order('order_idx'),
    sb.from('my_calendar').select('*')
      .eq('school_id', schoolId).eq('teacher_id', String(teacherId))
      .eq('date', dateStr).in('type', ['event','routine','absence','deadline'])
      .order('start_time', { nullsFirst: true }),
    sb.from('daily_timetable').select('*')
      .eq('school_id', schoolId).eq('teacher_id', String(teacherId))
      .eq('target_date', dateStr).order('period_num'),
    sb.from('daily_schedules').select('period_num,start_time,end_time,display_order,target_grade,event_title')
      .eq('school_id', schoolId).eq('target_date', dateStr).gt('period_num', 0)
      .order('display_order'),
    sb.from('personal_tasks').select('*')
      .eq('school_id', schoolId).eq('teacher_id', String(teacherId))
      .order('sort_order', { nullsFirst: true }),
  ]);

  const academics   = acRes.data   || [];
  const personalEvs = calRes.data  || [];
  const timetable   = ttRes.data   || [];
  const schedules   = schRes.data  || [];
  const tasks       = taskRes.data || [];
  const memos = tasks.filter(t => t.task_type === 'memo' && t.date === dateStr);
  const todos = tasks.filter(t => t.task_type === 'todo');

  // 학년별 교시 시간 맵: grade → { period_num → {start, end} }
  // 학년마다 일과 시간이 다를 수 있으므로(고사·행사 등) 인스턴스 학년 기준으로 조회
  const gradeTimeMap = {};
  schedules.forEach(s => {
    const g = String(s.target_grade);
    if (!gradeTimeMap[g]) gradeTimeMap[g] = {};
    if (!gradeTimeMap[g][s.period_num])
      gradeTimeMap[g][s.period_num] = { start: s.start_time, end: s.end_time };
  });
  // 폴백용 전체 맵 (학년 정보 없는 인스턴스 대비)
  const periodTimeMap = {};
  Object.values(gradeTimeMap).forEach(gMap => {
    Object.entries(gMap).forEach(([p, t]) => {
      if (!periodTimeMap[p]) periodTimeMap[p] = t;
    });
  });

  // 학년별 스케줄 맵: 단축 수업 감지용 (grade → [{display_order, period_num}])
  const gradeSchedsMap = {};
  schedules.forEach(s => {
    const g = String(s.target_grade);
    if (!gradeSchedsMap[g]) gradeSchedsMap[g] = [];
    gradeSchedsMap[g].push(s);
  });

  const isHoliday = academics.some(ac => {
    const c = (ac.color || '').trim().toLowerCase();
    return c === '#e74c3c' || c === '#ef4444' || c === 'red';
  });

  const events = [];
  if (!isHoliday) {
    // vacated/absent 교시 집합 — 같은 교시의 normal 인스턴스 억제
    const vacatedPeriods = new Set(
      timetable.filter(t => t.status === 'vacated' || t.status === 'absent').map(t => t.period_num)
    );
    // fixed_ 과목: 같은 교시에 여러 학급이 있어도 하나의 블록만 표시 (N개 학급)
    const fixedCount = {};
    timetable.forEach(t => {
      if (!t.subject_name.startsWith('fixed_')) return;
      if (t.status === 'vacated' || t.status === 'absent') return;
      const key = `${t.period_num}_${t.subject_name}`;
      fixedCount[key] = (fixedCount[key] || 0) + 1;
    });
    const fixedSeen = new Set();

    timetable.forEach(t => {
      if (t.status === 'vacated' || t.status === 'absent') return;
      if (t.status === 'normal' && vacatedPeriods.has(t.period_num)) return;
      // 단축 수업 감지: 해당 학년의 maxDisplayOrder를 초과하는 교시는 표시 안 함
      if (parseInt(t.grade) > 0) {
        const gradeStr = String(t.grade);
        const gScheds = gradeSchedsMap[gradeStr] || gradeSchedsMap['all'] || [];
        if (gScheds.length > 0) {
          // 오늘 일과에 없는 교시(단축 포함, 재배열로 제거된 교시)는 표시 안 함
          const isMapped = gScheds.some(s => parseInt(s.period_num) === parseInt(t.period_num) && parseInt(s.period_num) > 0);
          if (!isMapped) return;
        }
      }
      // 행사 교시: supervision을 제외한 일반 수업 숨김 (예: 1학년 4~6교시 → 기타일정)
      // display_order 오름차순 정렬된 schedules에서 .find()로 첫 번째 매핑만 확인:
      // 같은 period_num이 여러 슬롯에 쓰이는 경우(이동 슬롯 + 행사 슬롯)
      // .some()은 행사 슬롯까지 찾아 오탐을 유발하므로 .find()를 사용해야 함
      if (parseInt(t.grade) > 0 && !t.subject_name.startsWith('supervision_')) {
        const gradeStr = String(t.grade);
        const schedEntry = schedules.find(s =>
          parseInt(s.period_num) === parseInt(t.period_num) &&
          String(s.target_grade) === gradeStr
        ) || schedules.find(s =>
          parseInt(s.period_num) === parseInt(t.period_num) &&
          s.target_grade === 'all'
        );
        if (schedEntry && schedEntry.event_title && schedEntry.event_title.trim() !== '') return;
      }
      // 학년별 시간 우선, 없으면 'all' → 전체 폴백
      const gradeStr = String(t.grade || '');
      const times = (gradeTimeMap[gradeStr] && gradeTimeMap[gradeStr][t.period_num])
        || (gradeTimeMap['all'] && gradeTimeMap['all'][t.period_num])
        || periodTimeMap[t.period_num];
      if (!times || !times.start || !times.end) return;
      const [sH, sM] = times.start.split(':').map(Number);
      const [eH, eM] = times.end.split(':').map(Number);
      const isSup = t.subject_name.startsWith('supervision_');
      const isFixed = t.subject_name.startsWith('fixed_');
      // fixed_ 과목은 교시당 첫 번째 하나만 추가
      if (isFixed) {
        const key = `${t.period_num}_${t.subject_name}`;
        if (fixedSeen.has(key)) return;
        fixedSeen.add(key);
      }
      const cnt = isFixed ? (fixedCount[`${t.period_num}_${t.subject_name}`] || 1) : 0;
      // display_order 계산: 일과 재배치 시 실제 교시번호(period_num)가 아닌 표시 순번으로 레이블 표기
      const _dispSched = schedules.find(s =>
        parseInt(s.period_num) === parseInt(t.period_num) &&
        parseInt(s.display_order) > 0 &&
        (!s.event_title || s.event_title.trim() === '') &&
        (s.target_grade === 'all' || String(s.target_grade) === String(t.grade || ''))
      );
      const displayOrderNum = _dispSched ? parseInt(_dispSched.display_order) : parseInt(t.period_num);
      events.push({
        type: 'class', status: t.status, isSup, isFixed,
        title: t.subject_name.replace(/^(supervision_|fixed_)/, ''), period_num: t.period_num,
        display_order: displayOrderNum,
        grade: t.grade, class_num: t.class_num, fixedCount: cnt,
        start: times.start.slice(0,5), end: times.end.slice(0,5),
        startMins: sH*60+sM, endMins: eH*60+eM
      });
    });
  }

  const allDayEvs = [];
  personalEvs.forEach(e => {
    if (!e.start_time) { allDayEvs.push(e); return; }
    const [sH, sM] = e.start_time.split(':').map(Number);
    const [eH, eM] = (e.end_time || e.start_time).split(':').map(Number);
    events.push({
      type: e.type, status: null,
      title: e.title, memo: e.memo || '',
      start: e.start_time.slice(0,5),
      end: (e.end_time || e.start_time).slice(0,5),
      startMins: sH*60+sM,
      endMins: (e.end_time ? eH*60+eM : sH*60+sM+60)
    });
  });

  // 체크리스트 트리거 배지
  const _clBtn = document.getElementById('cal-cl-trigger');
  if (_clBtn) _clBtn.classList.toggle('has-todos', todos.length > 0);

  renderCalendarGrid(el, { academics, events, allDayEvs, isCurrentDay: fmt(new Date()) === dateStr, memos });
}

function renderCalendarGrid(el, { academics, events, allDayEvs, isCurrentDay, memos = [] }) {
  const PX = 1.2, SH = 8, EH = 18;
  const calcY = mins => Math.max(0, (mins - SH*60) * PX);
  const gridH  = (EH - SH) * 60 * PX;

  if (academics.length === 0 && events.length === 0 && allDayEvs.length === 0 && memos.length === 0) {
    el.innerHTML = emptyHtml('calendar_month', '오늘 일정이 없습니다.');
    return;
  }

  let html = '';

  // 학사일정 칩
  if (academics.length > 0) {
    html += '<div class="tg-chips">';
    academics.forEach(ac => {
      const bg = ac.color ? ac.color + '22' : '#f1f3f4';
      html += `<span class="tg-chip" style="color:${ac.color||'#555'};background:${bg};">
        <span class="tg-chip-dot" style="background:${ac.color||'#bbb'};"></span>${ac.content}</span>`;
    });
    html += '</div>';
  }

  // 종일 개인 일정
  if (allDayEvs.length > 0) {
    const colorMap = { event:'#1a73e8', routine:'#1a73e8', absence:'#e65100', deadline:'#c62828' };
    html += '<div class="tg-allday">';
    allDayEvs.forEach(e => {
      const c = colorMap[e.type] || '#555';
      html += `<div class="tg-allday-row" style="border-left:3px solid ${c};">
        <span style="flex:1;">${e.title}</span><span style="font-size:11px;color:#aaa;">종일</span></div>`;
    });
    html += '</div>';
  }

  // 시간 그리드
  html += `<div class="tg-wrap"><div class="tg-axis" style="height:${gridH}px;">`;
  for (let h = SH; h <= EH; h++)
    html += `<div class="tg-hour-lbl" style="top:${calcY(h*60)}px;">${String(h).padStart(2,'0')}</div>`;
  html += `</div><div class="tg-col" id="tg-col" style="height:${gridH}px;">`;
  for (let h = SH; h <= EH; h++) {
    html += `<div class="tg-grid-line" style="top:${calcY(h*60)}px;"></div>`;
    if (h < EH) html += `<div class="tg-grid-line half" style="top:${calcY(h*60+30)}px;"></div>`;
  }
  html += '</div></div>';

  el.innerHTML = html;

  const col = document.getElementById('tg-col');
  if (!col) return;

  // 보이는 이벤트만 필터 + 시간순 정렬
  const visible = events.filter(ev => ev.startMins < EH*60 && ev.endMins > SH*60);
  visible.sort((a, b) => a.startMins - b.startMins || b.endMins - a.endMins);

  // 트랙(컬럼) 배정
  const colEnds = [];
  visible.forEach(ev => {
    let c = colEnds.findIndex(end => end <= ev.startMins);
    if (c === -1) { c = colEnds.length; colEnds.push(0); }
    ev._c = c; colEnds[c] = ev.endMins;
  });

  // Union-Find로 겹치는 이벤트 그룹화 → 그룹 내 최대 컬럼 수 산출
  const par = visible.map((_, i) => i);
  const uf  = x => par[x] === x ? x : (par[x] = uf(par[x]));
  for (let i = 0; i < visible.length; i++)
    for (let j = i+1; j < visible.length; j++)
      if (visible[i].startMins < visible[j].endMins && visible[j].startMins < visible[i].endMins)
        par[uf(i)] = uf(j);
  const gMax = {};
  visible.forEach((ev, i) => { const g = uf(i); gMax[g] = Math.max(gMax[g]||0, ev._c); });
  visible.forEach((ev, i) => { ev._nc = (gMax[uf(i)]||0)+1; });

  visible.forEach(ev => {
    const topY = calcY(Math.max(ev.startMins, SH*60));
    const botY = calcY(Math.min(ev.endMins, EH*60));
    const bH   = Math.max(botY - topY, 20);
    const cW   = 100 / (ev._nc||1);

    const block = document.createElement('div');
    block.className = 'tg-block';
    if (ev.type === 'class') {
      block.classList.add(
        ev.status === 'reinforcement' ? 'tg-reinf'   :
        ev.status === 'changed'       ? 'tg-changed' :
        ev.isSup                      ? 'tg-sup'     : 'tg-class'
      );
    } else {
      block.classList.add('tg-' + (ev.type || 'event'));
    }
    block.style.cssText =
      `top:${topY}px;height:${bH}px;width:calc(${cW}% - 3px);left:calc(${cW*(ev._c||0)}% + 1px);`;

    let titleStr = ev.title;
    let sub = '';
    if (ev.type === 'class') {
      const gradeStr = (ev.isFixed || !ev.grade || !ev.class_num) ? '' : ` ${ev.grade}-${ev.class_num}`;
      titleStr = (ev.display_order ? `${ev.display_order}교시 ` : '') + ev.title + gradeStr;
      if (ev.status === 'changed')        sub = '<span class="tg-blk-tag" style="color:#e65100;">변경</span>';
      else if (ev.status === 'reinforcement')  sub = '<span class="tg-blk-tag" style="color:#e11d48;">보강</span>';
      else if (ev.isSup)                       sub = '<span class="tg-blk-tag" style="color:#6a1b9a;">임장</span>';
    }
    block.innerHTML =
      `<div class="tg-blk-title" style="font-size:${bH<24?'12px':'13px'};">${titleStr}${sub}</div>` +
      (bH >= 28 ? `<div class="tg-blk-sub">${ev.start}–${ev.end}</div>` : '');
    col.appendChild(block);
  });

  // 민트 메모 점
  memos.forEach(memo => {
    const [h, m] = (memo.time || '00:00').split(':').map(Number);
    const clampedMins = Math.max(SH*60, Math.min(h*60+m, EH*60-1));
    const wrap = document.createElement('div');
    wrap.className = 'tg-mint-wrap';
    wrap.style.top = (calcY(clampedMins) - 8) + 'px';
    const timeStr = (!memo.time || memo.time === '00:00') ? '종일' : memo.time;
    const safe = (memo.content || '').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    wrap.innerHTML = `<div class="tg-mint-pin"></div>
      <div class="tg-mint-popover"><span style="opacity:.75;font-size:11px;">${timeStr}</span><br>${safe}</div>`;
    wrap.addEventListener('click', e => {
      e.stopPropagation();
      const wasActive = wrap.classList.contains('active');
      col.querySelectorAll('.tg-mint-wrap.active').forEach(w => w.classList.remove('active'));
      if (!wasActive) wrap.classList.add('active');
    });
    col.appendChild(wrap);
  });

  if (isCurrentDay) {
    _calUpdateNowLine();
    _calTimer = setInterval(_calUpdateNowLine, 60000);
  }
}

function _calUpdateNowLine() {
  const col = document.getElementById('tg-col');
  if (!col) { if (_calTimer) { clearInterval(_calTimer); _calTimer = null; } return; }
  const PX = 1.2, SH = 8, EH = 18;
  let line = col.querySelector('.tg-now-line');
  const now = new Date();
  const h = now.getHours(), m = now.getMinutes();
  if (h < SH || h >= EH) { if (line) line.remove(); return; }
  if (!line) { line = document.createElement('div'); line.className = 'tg-now-line'; col.appendChild(line); }
  line.style.top = Math.max(0, (h*60+m - SH*60) * PX) + 'px';
}

// ════════════════ 2. 학사일정 ════════════════
function isRedColor(hex) {
  const c = (hex || '').trim().toLowerCase();
  if (c === 'red') return true;
  const m = c.match(/^#([0-9a-f]{6})$/i);
  if (!m) return false;
  const r = parseInt(m[1].substr(0,2), 16);
  const g = parseInt(m[1].substr(2,2), 16);
  const b = parseInt(m[1].substr(4,2), 16);
  return r > 160 && r > g * 1.8 && r > b * 1.8;
}

async function loadAcademic() {
  const d = state.academic;
  const year = d.getFullYear(), month = d.getMonth();
  document.getElementById('academic-month-label').textContent = `${year}년 ${month+1}월`;

  const el = document.getElementById('academic-content');

  const start = `${year}-${p2(month+1)}-01`;
  const lastDay = new Date(year, month+1, 0).getDate();
  const end   = `${year}-${p2(month+1)}-${p2(lastDay)}`;

  const { data: events } = await sb.from('academic_calendar')
    .select('*').eq('school_id', me.user_metadata.school_id).gte('event_date', start).lte('event_date', end).order('event_date').order('order_idx');

  // 날짜→이벤트 맵
  const eventMap = {};
  (events || []).forEach(e => {
    if (!eventMap[e.event_date]) eventMap[e.event_date] = [];
    eventMap[e.event_date].push(e);
  });

  // 월 첫 날의 요일 기준 주 시작 계산 (월요일 기준)
  const first = new Date(year, month, 1);
  const firstDay = first.getDay(); // 0=일
  // 월요일 기준: 첫 주 월요일 찾기
  const startOffset = firstDay === 0 ? -6 : 1 - firstDay;
  const gridStart = new Date(year, month, 1 + startOffset);

  let html = `<table class="cal-table"><thead><tr>
    <th>월</th><th>화</th><th>수</th><th>목</th><th>금</th>
  </tr></thead><tbody>`;

  let cur = new Date(gridStart);
  const todayStr = fmt(new Date());
  let inMonth = false;
  let weekCount = 0;

  while (weekCount < 7) {
    // 이 주에 이번 달 날짜가 하나라도 있는지 확인
    const weekHasMonth = [0,1,2,3,4].some(i => {
      const dd = new Date(cur); dd.setDate(dd.getDate() + i);
      return dd.getMonth() === month && dd.getFullYear() === year;
    });
    if (!weekHasMonth && inMonth) break;
    if (weekHasMonth) inMonth = true;

    html += '<tr>';
    for (let i = 0; i < 5; i++) {
      const day = new Date(cur);
      day.setDate(day.getDate() + i);
      const dStr = fmt(day);
      const inCurMonth = day.getMonth() === month;
      const isT = dStr === todayStr;
      const dayEvents = (inCurMonth && eventMap[dStr]) ? eventMap[dStr] : [];
      const hasHoliday = dayEvents.some(ev => isRedColor(ev.color));
      const dayNumStyle = (!isT && hasHoliday) ? ' style="color:#e74c3c;"' : '';
      html += `<td class="${inCurMonth ? '' : 'outside'}">
        <span class="day-num${isT ? ' today-circle' : ''}"${dayNumStyle}>${day.getDate()}</span>`;
      dayEvents.forEach(ev => {
        const color = ev.color || '#95a5a6';
        const bg = color + '22';
        html += `<span class="event-pill" style="color:${color};background:${bg};">${ev.content}</span>`;
      });
      html += '</td>';
    }
    html += '</tr>';
    cur.setDate(cur.getDate() + 7);
    weekCount++;
  }

  html += '</tbody></table>';
  el.innerHTML = html;
}

// ════════════════ 3. 일과시간표 ════════════════
function _periodGradeSelect(uid, grade) {
  const warn  = document.getElementById(`${uid}_warn`);
  const sched = document.getElementById(`${uid}_sched`);
  if (warn)  warn.style.display  = 'none';
  if (sched) sched.style.display = '';
  document.querySelectorAll(`[id^="${uid}_tbl_"]`).forEach(el => el.style.display = 'none');
  const tbl = document.getElementById(`${uid}_tbl_${grade}`);
  if (tbl) tbl.style.display = '';
  document.querySelectorAll(`[id^="${uid}_btn_"]`).forEach(btn => {
    btn.style.background = 'white'; btn.style.color = '#1a73e8';
  });
  const btn = document.getElementById(`${uid}_btn_${grade}`);
  if (btn) { btn.style.background = '#1a73e8'; btn.style.color = 'white'; }
  const el = document.getElementById('periods-content');
  if (el) el.scrollTop = 0;
}

async function loadPeriods() {
  const d = state.periods;
  document.getElementById('periods-date-label').textContent = dateLabel(d);
  const el = document.getElementById('periods-content');

  const { data } = await sb.from('daily_schedules')
    .select('*').eq('school_id', me.user_metadata.school_id).eq('target_date', fmt(d)).order('display_order');

  if (!data || data.length === 0) {
    el.innerHTML = emptyHtml('schedule', '이 날의 일과 정보가 없습니다.');
    return;
  }

  const toMins = t => { const [h, m] = t.split(':').map(Number); return h * 60 + m; };

  // 전일제: period_num=0 이고 event_title 있는 행 (전체 공통)
  const fullDayRow = data.find(r => parseInt(r.period_num) === 0 && r.event_title && !r.is_separate);
  if (fullDayRow) {
    el.innerHTML = `<div class="period-card">
      <div class="period-row" style="background:#e8fcf0;">
        <div class="p-num" style="color:#15803d;">${fullDayRow.event_title}</div>
        <div class="p-time" style="color:#15803d;">${fullDayRow.start_time} ~ ${fullDayRow.end_time}</div>
        <div class="p-event"></div>
      </div>
    </div>`;
    return;
  }

  // 'all' 학년 행
  const allRows = data
    .filter(r => r.target_grade === 'all' && parseInt(r.period_num) > 0)
    .sort((a, b) => a.display_order - b.display_order);

  // 학년별 행 (target_grade !== 'all')
  const gradeRows = data.filter(r => r.target_grade !== 'all' && parseInt(r.period_num) > 0);

  // 학년별 시간이 다른지 확인
  if (gradeRows.length > 0) {
    const checkByOrder = {};
    [...allRows, ...gradeRows].forEach(s => {
      const key = s.display_order;
      if (!checkByOrder[key]) checkByOrder[key] = new Set();
      checkByOrder[key].add(`${s.start_time}~${s.end_time}`);
    });
    if (Object.values(checkByOrder).some(set => set.size > 1)) {
      const grades = [...new Set(gradeRows.map(s => s.target_grade))].sort();
      const uid = `pg_${fmt(d).replace(/-/g, '')}`;

      const buildGradeCard = grade => {
        const rows = gradeRows
          .filter(s => s.target_grade === grade)
          .sort((a, b) => a.display_order - b.display_order);
        let t = '<div class="period-card">';
        rows.forEach((r, i) => {
          t += `<div class="period-row">
            <div class="p-num">${i + 1}교시</div>
            <div class="p-time">${r.start_time} ~ ${r.end_time}</div>
            <div class="p-event">${r.event_title || ''}</div>
          </div>`;
          if (i < rows.length - 1) {
            const gap = toMins(rows[i + 1].start_time) - toMins(r.end_time);
            if (gap >= 40) {
              t += `<div class="period-row period-row-lunch">
                <div class="p-num" style="color:#c2410c;">점심</div>
                <div class="p-time" style="color:#c2410c;">${r.end_time} ~ ${rows[i + 1].start_time}</div>
                <div class="p-event"></div>
              </div>`;
            }
          }
        });
        t += '</div>';
        return t;
      };

      // ① 경고 섹션
      let html = `<div id="${uid}_warn" style="display:flex;flex-direction:column;gap:8px;padding:12px 16px;background:#fff5f5;border-radius:12px;margin:12px 16px;">
        <div style="display:flex;align-items:center;gap:8px;">
          <span class="material-symbols-outlined" style="color:#f43f5e;font-size:18px;">warning</span>
          <span style="font-size:13px;color:#9f1239;font-weight:600;">학년별로 일과 시간이 다릅니다.</span>
        </div>
        <div style="display:flex;gap:6px;">`;
      grades.forEach(g => {
        html += `<button class="period-grade-btn" onclick="_periodGradeSelect('${uid}','${g}')">${g}학년</button>`;
      });
      html += `</div></div>`;

      // ② 시간표 섹션
      html += `<div id="${uid}_sched" style="display:none;">`;
      grades.forEach(g => {
        html += `<div id="${uid}_tbl_${g}" style="display:none;">${buildGradeCard(g)}</div>`;
      });
      html += `<div style="display:flex;gap:6px;padding:10px 16px 14px;justify-content:center;">`;
      grades.forEach(g => {
        html += `<button class="period-grade-btn" id="${uid}_btn_${g}" onclick="_periodGradeSelect('${uid}','${g}')">${g}학년</button>`;
      });
      html += `</div></div>`;

      el.innerHTML = html;
      return;
    }
  }

  // 공통 일과 (all 또는 모든 학년 동일)
  let displayRows = allRows;
  if (displayRows.length === 0 && gradeRows.length > 0) {
    const firstGrade = gradeRows[0].target_grade;
    displayRows = gradeRows
      .filter(s => s.target_grade === firstGrade)
      .sort((a, b) => a.display_order - b.display_order);
  }
  if (displayRows.length === 0) {
    el.innerHTML = emptyHtml('schedule', '이 날의 일과 정보가 없습니다.');
    return;
  }

  let html = '<div class="period-card">';
  displayRows.forEach((r, i) => {
    html += `<div class="period-row">
      <div class="p-num">${i + 1}교시</div>
      <div class="p-time">${r.start_time} ~ ${r.end_time}</div>
      <div class="p-event">${r.event_title || ''}</div>
    </div>`;
    if (i < displayRows.length - 1) {
      const gap = toMins(displayRows[i + 1].start_time) - toMins(r.end_time);
      if (gap >= 40) {
        html += `<div class="period-row period-row-lunch">
          <div class="p-num" style="color:#c2410c;">점심</div>
          <div class="p-time" style="color:#c2410c;">${r.end_time} ~ ${displayRows[i + 1].start_time}</div>
          <div class="p-event"></div>
        </div>`;
      }
    }
  });
  html += '</div>';
  el.innerHTML = html;
}

// ════════════════ 4. 주간 시간표 ════════════════
async function loadTimetable() {
  const monday = getMonday(new Date(), state.timetableWeek);
  const days   = [0,1,2,3,4].map(i => addDays(monday, i));
  const dates  = days.map(fmt);
  const todayStr = fmt(new Date());
  const schoolId = me.user_metadata.school_id;
  const teacherId = String(me.user_metadata.teacher_id);

  document.getElementById('timetable-week-label').textContent =
    `${p2(days[0].getMonth()+1)}.${p2(days[0].getDate())} ~ ${p2(days[4].getMonth()+1)}.${p2(days[4].getDate())}`;

  const el = document.getElementById('timetable-content');

  const [ttRes, schRes] = await Promise.all([
    // 내 수업 + 내 결강 슬롯을 보강하는 타인의 인스턴스(changed_user_id = me) 함께 조회
    sb.from('daily_timetable').select('*')
      .eq('school_id', schoolId).in('target_date', dates)
      .or(`teacher_id.eq.${teacherId},and(changed_user_id.eq.${teacherId},status.eq.reinforcement)`),
    sb.from('daily_schedules').select('*')
      .eq('school_id', schoolId).in('target_date', dates)
  ]);

  const allInst   = ttRes.data  || [];
  const allScheds = schRes.data || [];

  // hiddenIds: vacated 인스턴스와 동일 서명(교사+학년+반+날짜+교시)의 normal을 숨김
  const hiddenIds = new Set();
  const vacSigs   = new Set();
  allInst.filter(i => i.status === 'vacated' || i.status === 'absent').forEach(i =>
    vacSigs.add(`${i.teacher_id}_${i.grade}_${i.class_num}_${i.target_date}_${i.period_num}`)
  );
  allInst.filter(i => i.status === 'normal').forEach(i => {
    if (vacSigs.has(`${i.teacher_id}_${i.grade}_${i.class_num}_${i.target_date}_${i.period_num}`))
      hiddenIds.add(i.internal_id);
  });

  // maxRows: display_order 최대값
  const maxRows = allScheds.length > 0
    ? Math.max(...allScheds.map(s => parseInt(s.display_order) || 0))
    : 0;

  // effMax: schedule 행수와 실제 수업 교시수 중 큰 값 (다른 날의 7교시 누락 방지)
  const maxInstPeriod = allInst.length > 0
    ? Math.max(0, ...allInst.filter(i => parseInt(i.period_num) > 0).map(i => parseInt(i.period_num)))
    : 0;
  const effMax = Math.max(maxRows, maxInstPeriod) || 7;

  if (effMax === 7 && allInst.length === 0) {
    el.innerHTML = '<div style="background:white;padding:48px 24px;text-align:center;color:#ccc;font-size:14px;">이번 주 수업이 없습니다.</div>';
    return;
  }

  // 전일제 스팬 셀 사전 계산 — rowspan 하나로 열 전체를 녹색 블록 처리
  const spanCells = {};
  days.forEach(d => {
    const dStr = fmt(d);
    const ds = allScheds.filter(s => s.target_date === dStr);
    const fullDay = ds.find(s => parseInt(s.period_num) === 0 && s.event_title && !s.is_separate);
    if (fullDay) {
      const evT = fullDay.event_short_name || fullDay.event_title;
      spanCells[dStr] = `<td rowspan="${effMax}" class="tt-mc tt-c-event"
        style="text-align:center;vertical-align:middle;padding:4px;">
        <span style="writing-mode:vertical-rl;text-orientation:mixed;font-size:0.9rem;font-weight:900;color:#15803d;">${evT}</span>
      </td>`;
    }
  });

  const dayLabels = ['월','화','수','목','금'];
  let html = `<table class="tt-table"><thead><tr><th></th>`;
  days.forEach((d, i) => {
    const dStr = fmt(d);
    html += `<th class="${dStr===todayStr?'today-col':''}">${dayLabels[i]}<br>
      <span style="font-weight:400;color:#aaa;font-size:10px;">${p2(d.getMonth()+1)}/${p2(d.getDate())}</span></th>`;
  });
  html += `</tr></thead><tbody>`;
  for (let row = 1; row <= effMax; row++) {
    html += `<tr><td class="period-col">${row}</td>`;
    days.forEach(d => {
      const dStr = fmt(d);
      if (spanCells[dStr]) {
        if (row === 1) html += spanCells[dStr]; // rowspan이 나머지 행 커버
        return;
      }
      html += buildMobileCell(dStr, row, allInst, allScheds, hiddenIds, teacherId);
    });
    html += `</tr>`;
  }
  html += `</tbody></table>`;
  el.innerHTML = html;
}

function buildMobileCell(dateStr, rowOrder, allInst, allScheds, hiddenIds, teacherId) {
  const dayScheds = allScheds.filter(s => s.target_date === dateStr);

  // display_order → period_num 매핑 (target_grade='all' 행 우선)
  const schedEntry = dayScheds.find(s =>
    s.target_grade === 'all' && parseInt(s.display_order) === rowOrder && parseInt(s.period_num) > 0
  ) || dayScheds.find(s => parseInt(s.display_order) === rowOrder) || null;

  let actualPeriod = rowOrder;
  if (schedEntry && parseInt(schedEntry.period_num) > 0)
    actualPeriod = parseInt(schedEntry.period_num);

  let isEventSlot = !!(schedEntry && schedEntry.event_title && schedEntry.event_title.trim() !== '');

  // 이 display_order의 모든 학년이 임장 없는 행사인지 (교사 뷰 녹색 블록)
  const periodScheds = dayScheds.filter(s =>
    parseInt(s.display_order) === rowOrder && parseInt(s.period_num) !== 0
  );
  const isAllGradeEvent = periodScheds.length > 0 &&
    periodScheds.every(s => s.event_title && s.event_title.trim() !== '' && !s.is_separate);
  const allGradeShort = isAllGradeEvent
    ? (periodScheds[0].event_short_name || periodScheds[0].event_title.slice(0, 4))
    : '';

  // 이 날 일과 데이터가 있는데 display_order를 초과하면 빈 셀
  if (dayScheds.length > 0) {
    const dayMax = Math.max(...dayScheds.map(s => parseInt(s.display_order) || 0));
    if (rowOrder > dayMax) return `<td class="tt-c-nodata"></td>`;
  }

  // 이 교사·날짜·교시의 인스턴스 수집 (grade-specific display_order→period_num 매핑 지원)
  const _gpm = {};
  dayScheds.forEach(s => {
    if (s.target_grade === 'all' || parseInt(s.period_num) <= 0) return;
    if (parseInt(s.display_order) !== rowOrder) return;
    _gpm[String(s.target_grade)] = parseInt(s.period_num);
  });
  const _hasGS = Object.keys(_gpm).length > 0;
  let raw = allInst.filter(i => {
    if (i.target_date !== dateStr) return false;
    const g = String(i.grade);
    if (!_hasGS) return parseInt(i.period_num) === actualPeriod;
    if (_gpm[g] !== undefined) return parseInt(i.period_num) === _gpm[g];
    if (dayScheds.some(s => String(s.target_grade) === g)) return false;
    return parseInt(i.period_num) === actualPeriod;
  });

  // 학년별 일과가 분리된 경우:
  // (1) 단축 수업: 해당 학년의 maxDisplayOrder < rowOrder → 인스턴스 제거
  // (2) 행사 교시: 교사의 담당 학년에 event_title 있으면 isEventSlot=true
  {
    const shortenedGrades = new Set();
    raw.filter(i => parseInt(i.grade) > 0).forEach(i => {
      const gradeStr = String(i.grade);
      const gScheds = dayScheds.filter(s => String(s.target_grade) === gradeStr);
      if (gScheds.length > 0) {
        const maxDo = Math.max(...gScheds.map(s => parseInt(s.display_order) || 0));
        const isMapped = gScheds.some(s => parseInt(s.period_num) === parseInt(i.period_num) && parseInt(s.period_num) > 0);
        if (rowOrder > maxDo && !isMapped) shortenedGrades.add(gradeStr);
      }
    });
    if (shortenedGrades.size > 0) raw = raw.filter(i => !shortenedGrades.has(String(i.grade)));

    if (!isEventSlot) {
      const teacherGrades = raw
        .filter(i => parseInt(i.grade) > 0 && i.status !== 'vacated' && i.status !== 'absent')
        .map(i => String(i.grade));
      if (teacherGrades.length > 0) {
        isEventSlot = dayScheds.some(s =>
          teacherGrades.includes(String(s.target_grade)) &&
          parseInt(s.display_order) === rowOrder &&
          s.event_title && s.event_title.trim() !== ''
        );
      }
    }
  }

  // 행사 슬롯: supervision만 남기고 나머지 제거
  if (isEventSlot) raw = raw.filter(i => i.subject_name.startsWith('supervision_'));

  // fixed_ 결강 처리: vacated fixed_와 같은 이름의 normal은 숨김
  const vacFixedSubs = new Set(
    raw.filter(i => i.status === 'vacated' && i.subject_name.startsWith('fixed_')).map(i => i.subject_name)
  );
  const isFixedAbsent = sub => sub.startsWith('fixed_') && vacFixedSubs.has(sub);

  const hasVacated = raw.some(i => i.status === 'vacated' || i.status === 'absent') ||
    raw.some(i => i.status === 'normal' && isFixedAbsent(i.subject_name));

  // changed_user_id = me 인 reinforcement 인스턴스 = 내 결강 슬롯을 타인이 보강 중
  // → hasReinf 감지에만 사용하고 display에서는 제외
  const hasReinf = raw.some(i =>
    i.status === 'reinforcement' && i.teacher_id !== teacherId
  );

  const display = raw.filter(i => {
    if (i.status === 'vacated' || i.status === 'absent') return false;
    if (i.status === 'reinforcement' && i.teacher_id !== teacherId) return false;
    if (i.status === 'normal' && hiddenIds.has(i.internal_id)) return false;
    if (i.status === 'normal' && isFixedAbsent(i.subject_name)) return false;
    return true;
  });

  // 결강 (표시할 내용 없음): 보강 배정 완료면 붉은 점선, 미배정이면 노란 점선
  if (hasVacated && display.length === 0) {
    return `<td class="tt-mc ${hasReinf ? 'tt-c-vacated-reinf' : 'tt-c-vacated'}"></td>`;
  }

  // 빈 슬롯
  if (display.length === 0) {
    if (isAllGradeEvent)
      return `<td class="tt-mc tt-c-event"><div class="tt-bb"><div class="tt-bt">${allGradeShort}</div></div></td>`;
    return `<td class="tt-c-empty"></td>`;
  }

  // 표시 우선순위: supervision > 기타
  const supItems = display.filter(i => i.subject_name.startsWith('supervision_'));
  const regItems = display.filter(i => !i.subject_name.startsWith('supervision_'));

  // fixed_ 합동수업 중복 제거 후 실질 충돌 판단
  const _seenFixed = new Set();
  const dedupedReg = regItems.filter(i => {
    if (i.subject_name.startsWith('fixed_')) {
      if (_seenFixed.has(i.subject_name)) return false;
      _seenFixed.add(i.subject_name);
    }
    return true;
  });

  if (dedupedReg.length > 1) {
    // 충돌: 모든 블록 표시 + 붉은 테두리
    const conflictOrdered = [...supItems, ...dedupedReg];
    const blocksHtml = conflictOrdered.map(item => {
      const iS = item.subject_name.startsWith('supervision_');
      const iR = item.status === 'reinforcement';
      const iC = item.status === 'changed';
      const bdg = iS ? `<span class="tt-bdg tt-bdg-im">임</span>`
                : iR ? `<span class="tt-bdg tt-bdg-reinf">보</span>`
                : iC ? `<span class="tt-bdg tt-bdg-chg">변</span>` : '';
      let rs = item.subject_name.replace(/^supervision_/, '').replace(/^fixed_/, '');
      const ds = rs.length > 5 ? rs.slice(0, 4) + '..' : rs;
      const isFixed = item.subject_name.startsWith('fixed_');
      const st = isFixed ? '' : (item.grade > 0 ? `${item.grade}-${item.class_num}` : '');
      return `<div class="tt-bb"><div class="tt-bt">${ds}${bdg}</div>${st ? `<div class="tt-bs">${st}</div>` : ''}</div>`;
    }).join('');
    return `<td class="tt-mc tt-c-conflict">${blocksHtml}</td>`;
  }

  // 단일 블록 렌더링
  const main = supItems.length > 0 ? supItems[0] : display[0];

  const isSup   = main.subject_name.startsWith('supervision_');
  const isReinf = main.status === 'reinforcement';
  const isChg   = main.status === 'changed';

  let cellCls = 'tt-mc ';
  if (isSup)        cellCls += 'tt-c-sup';
  else if (isReinf) cellCls += 'tt-c-reinf';
  else if (isChg)   cellCls += 'tt-c-changed';
  else              cellCls += 'tt-c-normal';

  let badge = '';
  if (isSup)        badge = `<span class="tt-bdg tt-bdg-im">임</span>`;
  else if (isReinf) badge = `<span class="tt-bdg tt-bdg-reinf">보</span>`;
  else if (isChg)   badge = `<span class="tt-bdg tt-bdg-chg">변</span>`;

  const rawSub  = main.subject_name.replace(/^supervision_/, '').replace(/^fixed_/, '');
  const dispSub = rawSub.length > 5 ? rawSub.slice(0, 4) + '..' : rawSub;

  const isFixed = main.subject_name.startsWith('fixed_');
  const subText = isFixed ? '' : (main.grade > 0 ? `${main.grade}-${main.class_num}` : '');

  return `<td class="${cellCls}"><div class="tt-bb">
    <div class="tt-bt">${dispSub}${badge}</div>
    ${subText ? `<div class="tt-bs">${subText}</div>` : ''}
  </div></td>`;
}

// ════════════════ 5. 조종례 ════════════════
async function loadMorning() {
  const d = state.morning;
  document.getElementById('morning-date-label').textContent = dateLabel(d);
  const el = document.getElementById('morning-content');

  const grade = state.morningGrade;
  const { data } = await sb.from('announcements')
    .select('*').eq('school_id', me.user_metadata.school_id).eq('date', fmt(d))
    .in('target_grade', [grade, '전학년'])
    .order('id');

  if (!data || data.length === 0) {
    el.innerHTML = emptyHtml('campaign', '이 날의 전달사항이 없습니다.');
    return;
  }

  el.innerHTML = `<div class="morning-card">` +
    data.map(a => `
      <div class="morning-row">
        <div class="morning-meta">
          <span class="cat-badge">${a.category || '공지'}</span>
          <span class="grade-tag">${a.target_grade}</span>
        </div>
        <div class="morning-title">${a.title}</div>
        ${a.content ? `<div class="morning-content">${a.content}</div>` : ''}
        <div class="morning-author">${a.author_name || ''}</div>
      </div>`).join('') + `</div>`;
}

let _calClOpen = false;

function _calClToggle() {
  _calClOpen = !_calClOpen;
  document.getElementById('cal-cl-overlay').classList.toggle('open', _calClOpen);
  document.getElementById('cal-cl-backdrop').classList.toggle('open', _calClOpen);
  if (_calClOpen) _calClLoad();
}

async function _calClLoad() {
  const list = document.getElementById('cal-cl-list');
  if (!list || !me) return;
  const { data } = await sb.from('personal_tasks').select('*')
    .eq('school_id', me.user_metadata.school_id)
    .eq('teacher_id', String(me.user_metadata.teacher_id))
    .eq('task_type', 'todo')
    .order('sort_order', { nullsFirst: true });
  const todos = data || [];
  if (todos.length === 0) {
    list.innerHTML = '<div style="text-align:center;color:#94a3b8;font-size:13px;padding:24px;">할 일이 없습니다</div>';
    return;
  }
  list.innerHTML = todos.map(t => `
    <div class="tg-cl-item">
      <span class="material-symbols-outlined" style="font-size:17px;flex-shrink:0;color:${t.is_completed ? '#14b8a6' : '#cbd5e1'};">${t.is_completed ? 'check_circle' : 'radio_button_unchecked'}</span>
      <span class="tg-cl-text${t.is_completed ? ' done' : ''}">${
        (t.content || '').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      }</span>
    </div>`).join('');
}

// ── 캘린더 체크리스트 헬퍼 (미사용 — 오버레이로 대체)
function _renderMobileChecklist(container, todos) {
  const isOpen = localStorage.getItem('mobileTdpClOpen') !== 'false';
  const clDiv = document.createElement('div');
  clDiv.className = 'tg-checklist';
  clDiv.innerHTML = `
    <div class="tg-cl-header${isOpen ? '' : ' collapsed'}" onclick="_mobileToggleCl(this)">
      <div class="tg-cl-title">
        <span class="material-symbols-outlined" style="font-size:16px;color:#14b8a6;">checklist</span>
        나의 할 일
        <span class="tg-cl-badge">${todos.length}</span>
      </div>
      <span class="material-symbols-outlined tg-cl-chevron">expand_more</span>
    </div>
    <div class="tg-cl-body"${isOpen ? '' : ' style="display:none;"'}>
      ${todos.map(t => `
        <div class="tg-cl-item">
          <input type="checkbox" class="tg-cl-check" ${t.is_completed ? 'checked' : ''}
            onchange="_mobileToggleTask(${t.internal_id}, this)">
          <span class="tg-cl-text${t.is_completed ? ' done' : ''}">${
            (t.content || '').replace(/</g,'&lt;').replace(/>/g,'&gt;')
          }</span>
        </div>`).join('')}
    </div>`;
  container.appendChild(clDiv);
}

function _mobileToggleCl(header) {
  const isCollapsed = header.classList.toggle('collapsed');
  header.nextElementSibling.style.display = isCollapsed ? 'none' : '';
  localStorage.setItem('mobileTdpClOpen', isCollapsed ? 'false' : 'true');
}

// ── 스와이프 네비게이션 ──
(function initSwipe() {
  const panels = document.querySelector('.tab-panels');
  let startX = 0, startY = 0, onHScroll = false;
  const THRESHOLD = 50;

  panels.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    onHScroll = !!e.target.closest('.tt-scroll');
  }, { passive: true });

  panels.addEventListener('touchend', e => {
    if (onHScroll) return;
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    if (Math.abs(dx) < THRESHOLD || Math.abs(dx) < Math.abs(dy)) return;
    const dir = dx < 0 ? 1 : -1; // 왼쪽 스와이프 → 다음, 오른쪽 → 이전
    if (currentTab === 'calendar' || currentTab === 'periods' || currentTab === 'morning') {
      moveDay(currentTab, dir);
    } else if (currentTab === 'academic') {
      moveMonth(dir);
    } else if (currentTab === 'timetable') {
      moveWeek(dir);
    }
  }, { passive: true });
})();
